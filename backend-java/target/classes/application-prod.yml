spring:
  datasource:
    url: ${PM_AGENT_DATABASE_URL}
    username: ${PM_AGENT_DATABASE_USERNAME}
    password: ${PM_AGENT_DATABASE_PASSWORD}

pm-agent:
  llm:
    primary:
      base-url: ${PM_AGENT_LLM_PRIMARY_BASE_URL}
      model: ${PM_AGENT_LLM_PRIMARY_MODEL}
      api-key: ${PM_AGENT_LLM_PRIMARY_API_KEY}
      timeout-seconds: ${PM_AGENT_LLM_PRIMARY_TIMEOUT_SECONDS:30}
      retry-times: ${PM_AGENT_LLM_PRIMARY_RETRY_TIMES:1}
    fallback:
      base-url: ${PM_AGENT_LLM_FALLBACK_BASE_URL:}
      model: ${PM_AGENT_LLM_FALLBACK_MODEL:}
      api-key: ${PM_AGENT_LLM_FALLBACK_API_KEY:}
      timeout-seconds: ${PM_AGENT_LLM_FALLBACK_TIMEOUT_SECONDS:20}
      retry-times: ${PM_AGENT_LLM_FALLBACK_RETRY_TIMES:0}
